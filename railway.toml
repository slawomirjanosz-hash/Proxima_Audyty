[build]
builder = "NIXPACKS"

[build.nixpacksPlan.variables]
NIXPACKS_NODE_VERSION = "20"

[deploy]
startCommand = "php artisan optimize:clear; php artisan migrate --force; php artisan db:seed --force; php artisan config:cache || true; php artisan route:cache || true; php artisan view:cache || true; php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/up"
healthcheckTimeout = 100
