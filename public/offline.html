<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brak połączenia – ENESA</title>
<style>
  :root { --green-deep:#1A4D3A; --paper:#F5EFE0; --gold:#A87F2A; }
  * { box-sizing:border-box; margin:0; }
  body { font-family:'Segoe UI',sans-serif; background:var(--paper); color:var(--green-deep);
         display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
  .card { text-align:center; max-width:400px; }
  .icon { font-size:64px; margin-bottom:16px; }
  h1 { font-size:24px; margin-bottom:8px; }
  p  { color:#76695A; font-size:15px; line-height:1.6; margin-bottom:20px; }
  button { background:var(--green-deep); color:var(--paper); border:none; padding:10px 24px;
           border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; }
  button:hover { background:#2E7D5C; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>Brak połączenia</h1>
  <p>Sprawdź połączenie z internetem i spróbuj ponownie.<br>Dane ENESA są bezpieczne i czekają na Ciebie.</p>
  <button onclick="location.reload()">Odśwież stronę</button>
</div>
</body>
</html>
